<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器学习监督页</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 10px;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 24%),
                radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.08), transparent 24%),
                linear-gradient(180deg, #f4f7ff 0%, #e9eff9 100%);
            color: #1f2937;
            overflow: hidden;
        }

        .page {
            max-width: 1800px;
            margin: 0 auto;
            min-height: calc(100vh - 20px);
            display: grid;
            grid-template-rows: auto auto auto 1fr;
            gap: 6px;
        }

        .hero {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(241, 245, 255, 0.92));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 22px;
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
        }

        .hero-left {
            min-width: 0;
        }

        h1 {
            margin: 0 0 2px;
            font-size: 24px;
            letter-spacing: 0.02em;
        }

        .model-badge {
            display: inline-block;
            margin-bottom: 4px;
            padding: 5px 9px;
            background: linear-gradient(135deg, #edf3ff, #dde8ff);
            color: #2953d6;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .sub {
            color: #6b7280;
            margin-bottom: 0;
            line-height: 1.4;
            font-size: 14px;
            max-width: 880px;
        }

        .hero-side {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .hero-chip {
            padding: 8px 10px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        }

        .hero-chip-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 2px;
        }

        .hero-chip-value {
            font-size: 16px;
            font-weight: 700;
        }

        .error-box {
            display: none;
            padding: 10px 12px;
            background: #fff1f2;
            color: #9f1239;
            border: 1px solid #fecdd3;
            border-radius: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 6px;
        }

        .card {
            background: rgba(255, 255, 255, 0.86);
            border-radius: 16px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.05);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #0ea5e9);
        }

        .label {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .value {
            font-size: 18px;
            font-weight: 700;
        }

        .note {
            margin-top: 4px;
            font-size: 10px;
            color: #64748b;
            line-height: 1.4;
        }

        .alerts {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }

        .alert {
            background: rgba(255, 255, 255, 0.88);
            border-left: 5px solid #f59e0b;
            border-radius: 16px;
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 10px 26px rgba(15, 23, 42, 0.05);
        }

        .alert.ok {
            border-left-color: #10b981;
        }

        .alert-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            align-items: stretch;
            min-height: 0;
            height: 100%;
            max-height: 520px;
        }

        .chart-card {
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06);
            overflow: hidden;
        }

        .chart-card h2 {
            margin: 0 0 4px;
            font-size: 16px;
            line-height: 1.3;
        }

        .chart-help {
            margin-bottom: 5px;
            font-size: 15px;
            color: #64748b;
            line-height: 1.45;
        }

        .chart {
            width: 100%;
            flex: 1;
            min-height: 120px;
        }

        @media (max-width: 1400px) {
            .hero {
                grid-template-columns: 1fr;
            }

            .grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 1200px) {
            .page {
                min-height: auto;
                display: block;
            }

            body {
                overflow: auto;
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .alerts {
                grid-template-columns: 1fr;
            }

            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 680px) {
            .hero-side {
                grid-template-columns: 1fr;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="hero">
            <div class="hero-left">
                <h1>机器学习监督页</h1>
                <div class="model-badge">第 3 层：蜜蜂行为模型的残差修正 ML</div>
                <div class="sub">
                    这个页面用于检查机器学习是否稳定。
                    左图是历史回测，用来验证 ML 是否比规则模型更接近实测值；右图才是面向未来的实际修正结果。
                </div>
            </div>
            <div class="hero-side">
                <div class="hero-chip">
                    <div class="hero-chip-label">监督对象</div>
                    <div class="hero-chip-value">行为预测修正</div>
                </div>
                <div class="hero-chip">
                    <div class="hero-chip-label">使用方式</div>
                    <div class="hero-chip-value">内部监测</div>
                </div>
            </div>
        </div>

        <div id="errorBox" class="error-box"></div>

        <div id="metricGrid" class="grid"></div>
        <div id="alerts" class="alerts"></div>

        <div class="chart-grid">
            <div class="chart-card">
                <h2>历史回测：实际值 / 规则预测 / ML 修正</h2>
                <div class="chart-help">
                    这里只是拿历史已知样本做回测验证，不是在“修正过去”。
                    目的是检查：如果把 ML 用在已知样本上，它会不会比规则模型更接近真实观测。
                </div>
                <div id="historyChart" class="chart"></div>
            </div>

            <div class="chart-card">
                <h2>未来试运行：规则预测 / ML 修正 / 修正量</h2>
                <div class="chart-help">
                    这里才是 ML 真正参与未来预测的位置。
                    黄色柱子表示它对规则模型加了多少修正，用来观察有没有出现异常偏移。
                </div>
                <div id="futureChart" class="chart"></div>
            </div>
        </div>
    </div>

    <script src="./ml_monitor.js"></script>
</body>

</html>
